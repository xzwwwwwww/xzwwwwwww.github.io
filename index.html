<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的小站 · My Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="#home" data-i18n="logo">小站</a>
      <div class="header-right">
        <nav class="nav">
          <a href="#home" class="nav-link active" data-i18n="navHome">首页</a>
          <a href="#notes" class="nav-link" data-i18n="navNotes">读书笔记</a>
          <a href="#life" class="nav-link" data-i18n="navLife">生活记录</a>
          <a href="#about" class="nav-link" data-i18n="navAbout">关于我</a>
          <a href="#inbox" class="nav-link" data-i18n="navInbox">留言信箱</a>
          <a href="#game" class="nav-link" data-i18n="navGame">小游戏</a>
        </nav>
        <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">EN</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- 首页 -->
    <section id="home" class="page active">
      <div class="hero">
        <h1 data-i18n="heroTitle">你好，欢迎来到我的小站</h1>
        <p class="hero-sub" data-i18n="heroSub">在这里记录生活，存放读过的书与想过的路。</p>
      </div>

      <!-- 白熊吃拉面小场景 -->
      <div class="scene-card">
        <div class="bear-scene">
          <div class="steam s1"></div>
          <div class="steam s2"></div>
          <div class="steam s3"></div>
          <div class="bear">
            <div class="ear ear-l"></div>
            <div class="ear ear-r"></div>
            <div class="face">
              <div class="eye eye-l"></div>
              <div class="eye eye-r"></div>
              <div class="blush blush-l"></div>
              <div class="blush blush-r"></div>
            </div>
          </div>
          <div class="bowl"></div>
          <div class="table"></div>
        </div>
        <p class="scene-caption" data-i18n="sceneCaption">今天也要好好吃饭，认真生活 🍜</p>
      </div>

      <h2 class="section-title" data-i18n="recentTitle">最近更新</h2>
      <div id="recent-notes" class="card-grid"></div>
    </section>

    <!-- 读书笔记 -->
    <section id="notes" class="page">
      <h2 class="section-title" data-i18n="notesTitle">读书笔记</h2>
      <div id="tag-filter" class="tag-filter"></div>
      <div id="note-list" class="note-list"></div>
    </section>

    <!-- 生活记录 -->
    <section id="life" class="page">
      <h2 class="section-title" data-i18n="lifeTitle">生活记录</h2>
      <div id="life-timeline" class="timeline"></div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="page">
      <h2 class="section-title" data-i18n="aboutTitle">关于我</h2>
      <div class="about-card">
        <p data-i18n="aboutIntro">这里写一段自我介绍：你是谁，喜欢什么，为什么建这个小站。</p>
        <p><span data-i18n="aboutContact">联系方式：</span><a href="mailto:you@example.com">you@example.com</a></p>
      </div>
    </section>

    <!-- 留言信箱 -->
    <section id="inbox" class="page">
      <h2 class="section-title" data-i18n="inboxTitle">留言信箱</h2>
      <div class="inbox-form-card">
        <input id="msg-username" type="text" maxlength="20">
        <textarea id="msg-content" rows="4" maxlength="500"></textarea>
        <button id="msg-submit" class="inbox-submit"></button>
        <p id="msg-status" class="inbox-status"></p>
      </div>
      <div id="msg-wall" class="msg-wall"></div>
      <div class="owner-entry">
        <button id="owner-toggle" class="owner-toggle"></button>
      </div>
      <div id="owner-panel" class="owner-panel hidden"></div>
    </section>

    <!-- 小游戏 -->
    <section id="game" class="page">
      <h2 class="section-title" data-i18n="gameTitle">小游戏</h2>
      <div class="game-tabs">
        <button class="game-tab active" data-game="miner" data-i18n="tabMiner">黄金矿工</button>
        <button class="game-tab" data-game="pvz" data-i18n="tabPvz">植物大战僵尸</button>
        <button class="game-tab" data-game="sweeper" data-i18n="tabSweeper">扫雷</button>
        <button class="game-tab" data-game="snake" data-i18n="tabSnake">贪吃蛇</button>
      </div>
      <div id="panel-miner" class="game-panel active">
        <div class="game-card">
          <canvas id="game-canvas" width="760" height="500"></canvas>
          <div class="game-bar">
            <button id="game-start" class="inbox-submit"></button>
          </div>
        </div>
      </div>
      <div id="panel-pvz" class="game-panel">
        <div class="game-card">
          <canvas id="pvz-canvas" width="800" height="600"></canvas>
          <div class="game-bar">
            <button id="pvz-start" class="inbox-submit"></button>
          </div>
        </div>
      </div>
      <div id="panel-sweeper" class="game-panel">
        <div class="game-card">
          <div id="ms-levels" class="ms-levels"></div>
          <div class="ms-bar">
            <span id="ms-mines"></span>
            <button id="ms-reset" class="ms-reset">😀</button>
            <span id="ms-time"></span>
          </div>
          <div class="ms-scroll">
            <div id="ms-grid" class="ms-grid"></div>
          </div>
          <p id="ms-status" class="inbox-status"></p>
        </div>
      </div>
      <div id="panel-snake" class="game-panel">
        <div class="game-card">
          <canvas id="snake-canvas" width="520" height="520"></canvas>
          <div class="game-bar">
            <button id="snake-start" class="inbox-submit"></button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- 笔记阅读弹层 -->
  <div id="reader" class="reader hidden">
    <div class="reader-panel">
      <button id="reader-close" class="reader-close" aria-label="关闭">×</button>
      <h2 id="reader-title"></h2>
      <p id="reader-meta" class="reader-meta"></p>
      <div id="reader-body" class="reader-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p data-i18n="footer">© 2026 我的小站 · 用心记录每一天</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js?v=8"></script>
  <script src="js/data.js?v=8"></script>
  <script src="js/main.js?v=8"></script>
  <script src="js/inbox.js?v=8"></script>
  <script src="js/game.js?v=8"></script>
  <script src="js/pvz.js?v=8"></script>
  <script src="js/minesweeper.js?v=8"></script>
  <script src="js/snake.js?v=8"></script>
</body>
</html>
