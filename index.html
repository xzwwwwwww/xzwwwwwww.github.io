<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的小站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="#home">小站</a>
      <nav class="nav">
        <a href="#home" class="nav-link active">首页</a>
        <a href="#notes" class="nav-link">读书笔记</a>
        <a href="#life" class="nav-link">生活记录</a>
        <a href="#about" class="nav-link">关于我</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- 首页 -->
    <section id="home" class="page active">
      <div class="hero">
        <h1>你好，欢迎来到我的小站</h1>
        <p class="hero-sub">在这里记录生活，存放读过的书与想过的路。</p>
      </div>
      <h2 class="section-title">最近更新</h2>
      <div id="recent-notes" class="card-grid"></div>
    </section>

    <!-- 读书笔记 -->
    <section id="notes" class="page">
      <h2 class="section-title">读书笔记</h2>
      <div id="tag-filter" class="tag-filter"></div>
      <div id="note-list" class="note-list"></div>
    </section>

    <!-- 生活记录 -->
    <section id="life" class="page">
      <h2 class="section-title">生活记录</h2>
      <div id="life-timeline" class="timeline"></div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="page">
      <h2 class="section-title">关于我</h2>
      <div class="about-card">
        <p>这里写一段自我介绍：你是谁，喜欢什么，为什么建这个小站。</p>
        <p>联系方式：<a href="mailto:you@example.com">you@example.com</a></p>
      </div>
    </section>

  </main>

  <!-- 笔记阅读弹层 -->
  <div id="reader" class="reader hidden">
    <div class="reader-panel">
      <button id="reader-close" class="reader-close" aria-label="关闭">×</button>
      <h2 id="reader-title"></h2>
      <p id="reader-meta" class="reader-meta"></p>
      <div id="reader-body" class="reader-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>© 2026 我的小站 · 用心记录每一天</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
